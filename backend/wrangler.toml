name = "nexus-alert-backend"
main = "src/worker.js"
compatibility_date = "2026-03-18"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/2 * * * *"]

[[kv_namespaces]]
binding = "NEXUS_ALERTS_KV"
id = "00000000000000000000000000000000" # Replace with real ID from Cloudflare dashboard before deploying

[[kv_namespaces]]
binding = "TESTIMONIALS"
id = "00000000000000000000000000000001" # Replace with real ID: wrangler kv:namespace create TESTIMONIALS

# Cloudflare Queue for email/SMS notifications
[[queues.producers]]
queue = "email-notifications"
binding = "EMAIL_QUEUE"

[[queues.consumers]]
queue = "email-notifications"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "email-notifications-dlq"

[vars]
# Non-secret config — set secrets via `wrangler secret put <NAME>`
TWILIO_FROM_NUMBER = "" # Your Twilio number in E.164 format
STRIPE_PRO_PRICE_ID = "" # Pro tier price ID (set after creating in Stripe Dashboard)
SENTRY_DSN = "" # Sentry DSN for error tracking (https://YOUR_PROJECT_ID.ingest.sentry.io/YOUR_SENTRY_KEY)

# ────────────────────────────────────────────────────────────────────
# SECRETS (must be set via `wrangler secret put`, NOT in this file):
# ────────────────────────────────────────────────────────────────────
# wrangler secret put STRIPE_SECRET_KEY         (Stripe secret key, starts with sk_)
# wrangler secret put STRIPE_WEBHOOK_SECRET     (Stripe webhook signing secret, starts with whsec_)
# wrangler secret put STRIPE_MONTHLY_PRICE_ID   (Monthly subscription price ID, e.g., price_1Abc...)
# wrangler secret put STRIPE_ANNUAL_PRICE_ID    (Annual subscription price ID, e.g., price_1Def...)
# wrangler secret put TWILIO_ACCOUNT_SID        (Twilio account SID)
# wrangler secret put TWILIO_AUTH_TOKEN         (Twilio auth token)
# wrangler secret put RESEND_API_KEY            (Resend.com API key)
# wrangler secret put WEBHOOK_SECRET            (Internal API authentication secret)
# wrangler secret put SLACK_WEBHOOK_URL         (Slack incoming webhook URL for alerts)
# wrangler secret put CONVERTKIT_API_KEY        (ConvertKit API key for email automation)
# wrangler secret put CONVERTKIT_API_SECRET     (ConvertKit API secret)
# wrangler secret put CONVERTKIT_FORM_ID        (ConvertKit form ID for landing page signups)
# wrangler secret put CONVERTKIT_TAG_FREE       (ConvertKit tag ID for free tier users)
# wrangler secret put CONVERTKIT_TAG_PREMIUM    (ConvertKit tag ID for premium users)
# wrangler secret put CONVERTKIT_TAG_CHURNED    (ConvertKit tag ID for churned users)
# wrangler secret put CONVERTKIT_TAG_CONVERTED  (ConvertKit tag ID for converted users)

# ────────────────────────────────────────────────────────────────────
# PRODUCTION ENVIRONMENT
# ────────────────────────────────────────────────────────────────────
[env.production]
name = "nexus-alert-backend"
compatibility_date = "2026-03-18"
compatibility_flags = ["nodejs_compat"]

# Production cron: check every 2 minutes (premium feature)
[env.production.triggers]
crons = ["*/2 * * * *"]

# Production KV namespace (replace ID after creating namespace)
[[env.production.kv_namespaces]]
binding = "NEXUS_ALERTS_KV"
id = "REPLACE_WITH_PRODUCTION_NAMESPACE_ID"  # Run: wrangler kv:namespace create NEXUS_ALERTS_KV --env production

# Production Cloudflare Queue for email/SMS notifications
[[env.production.queues.producers]]
queue = "email-notifications-prod"
binding = "EMAIL_QUEUE"

[[env.production.queues.consumers]]
queue = "email-notifications-prod"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "email-notifications-prod-dlq"

# Production vars (non-secret)
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"

# Production secrets (set via wrangler secret put --env production):
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - STRIPE_MONTHLY_PRICE_ID
# - STRIPE_ANNUAL_PRICE_ID
# - RESEND_API_KEY
# - TWILIO_ACCOUNT_SID
# - TWILIO_AUTH_TOKEN
# - TWILIO_FROM_NUMBER
# - WEBHOOK_SECRET
